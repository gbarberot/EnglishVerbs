<title>Verb Quiz</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 30px;
  }

  #quiz {
    margin: 20px auto;

    transition: all 0.3s ease;
  }

  input {
    padding: 6px;
    margin-top: 5px;
    width: 200px;
    text-align: center;
  }
  td {
    min-width: 200px;
  }
  button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
  }

  /* Animations */
  .fade-out {
    opacity: 0;
    transform: translateX(-20px);
  }

  .fade-in {
    opacity: 1;
    transform: translateX(0);
  }
  input[type="number"] {
  width: 3.5em;
  }
</style>
</head>

<body>

<h2>English Verb Quiz</h2>

<h3 id="score">Score: 0 / 0</h3>
<h4 id="progress">Verb 0 / 0</h4>

<label>
  Number of verbs: 
          <button onclick="document.getElementById('verbCount').value = 10;startQuiz();">10</button>
          <button onclick="document.getElementById('verbCount').value = 20;startQuiz();">20</button>
          <input type="hidden" id="verbCount" value="10" min="10" max="100" pattern="[0-9]*">
          <button onclick="startQuiz()">Next Quizz</button>
</label>

<br><br>

<div id="quiz"></div>

<br>

<button onclick="checkAnswer()">Check</button>
<button onclick="nextVerb()">Next</button>

<script>
let allVerbs = [];
let quizVerbs = [];
let currentIndex = 0;
let currentVerb = null;
let visibleField = null;

let scoreCorrect = 0;
let scoreTotal = 0;
let answersVisible = false;

const fields = [
  { key: "base_form", label: "Base" },
  { key: "past_simple", label: "Past" },
  { key: "past_participle", label: "Participle" },
  { key: "French", label: "French" }
];


// ✅ Load JSON from HTML instead of file
const jsonText = document.getElementById('verbsData').textContent;
allVerbs = JSON.parse(jsonText);

// Start quiz
startQuiz();


// Shuffle
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// Start quiz
function startQuiz() {
  const count = parseInt(document.getElementById('verbCount').value) || 20;

  let copy = [...allVerbs];
  shuffle(copy);

  quizVerbs = copy.slice(0, count);
  currentIndex = 0;

  scoreCorrect = 0;
  scoreTotal = 0;
  updateScore();

  answersVisible = false;
  document.getElementById('toggleAnswersBtn').textContent = "Show Answers";

  loadVerb();
}

// Load one verb
function loadVerb() {
  if (currentIndex >= quizVerbs.length) {
    document.getElementById('quiz').innerHTML = "<h3>✅ Quiz finished!</h3>";
    document.getElementById('progress').textContent =
      `Completed ${quizVerbs.length} verbs`;
    return;
  }

  currentVerb = quizVerbs[currentIndex];
  visibleField = Math.floor(Math.random() * fields.length);

  // ✅ Build table
  let tableHTML = `
    <table style="margin: 0 auto; border-collapse: collapse;">
      <tr>
        ${fields.map(f => `<th style="border:1px solid #ccc; padding:8px;">${f.label}</th>`).join('')}
      </tr>
      <tr>
  `;

  tableHTML += fields.map((field, index) => {
    if (index === visibleField) {
      return `<td style="border:1px solid #ccc; padding:8px;"><strong>${currentVerb[field.key]}</strong></td>`;
    } else {
      return `
        <td style="border:1px solid #ccc; padding:8px;">
          <input type="text" data-key="${field.key}">
        </td>
      `;
    }
  }).join('');

  tableHTML += `
      </tr>
    </table>
  `;

  const quizDiv = document.getElementById('quiz');
  quizDiv.innerHTML = tableHTML;

  // ✅ Animation
  quizDiv.classList.add('fade-in');
  setTimeout(() => quizDiv.classList.remove('fade-in'), 300);

  updateProgress();
}


// Check answers
function checkAnswer() {
  const inputs = document.querySelectorAll('#quiz input');

  inputs.forEach(input => {
    const key = input.dataset.key;

    // Accept multiple answers (e.g., "was/were")
    const correctValues = currentVerb[key]
      .toLowerCase()
      .split('/')
      .map(v => v.trim());

    const user = input.value.toLowerCase().trim();

    scoreTotal++;

    if (correctValues.includes(user)) {
      input.style.backgroundColor = "#c8e6c9";
      scoreCorrect++;
    } else {
      input.style.backgroundColor = "#ffcdd2";
    }
  });

  updateScore();
}

// Next verb with animation
function nextVerb() {
  const quizDiv = document.getElementById('quiz');

  quizDiv.classList.add('fade-out');

  setTimeout(() => {
    currentIndex++;

    answersVisible = false;
    document.getElementById('toggleAnswersBtn').textContent = "Show Answers";

    loadVerb();

    quizDiv.classList.remove('fade-out');
  }, 300);
}

// Toggle answers
function toggleAnswers() {
  const inputs = document.querySelectorAll('#quiz input');

  inputs.forEach(input => {
    const key = input.dataset.key;

    if (!answersVisible) {
      input.value = currentVerb[key];
      input.style.backgroundColor = "#e0e0e0";
      input.disabled = true;
    } else {
      input.value = "";
      input.style.backgroundColor = "";
      input.disabled = false;
    }
  });

  answersVisible = !answersVisible;

  document.getElementById('toggleAnswersBtn').textContent =
    answersVisible ? "Hide Answers" : "Show Answers";
}

// Score display
function updateScore() {
  const percent = scoreTotal > 0
    ? Math.round((scoreCorrect / scoreTotal) * 100)
    : 0;

  document.getElementById('score').textContent =
    `Score: ${scoreCorrect} / ${scoreTotal} (${percent}%)`;
}

// Progress display
function updateProgress() {
  document.getElementById('progress').textContent =
    `Verb ${currentIndex + 1} / ${quizVerbs.length}`;
}
</script>

</body>
</html>
